      "AccessToken": { "type": "apiKey", "in": "header", "name": "Access-Token" }
    },
    "parameters": {
      "Page": { "name": "page", "in": "query", "required": false, "schema": { "type": "integer", "minimum": 1, "default": 1 } },
      "PageSize": { "name": "page_size", "in": "query", "required": false, "schema": { "type": "integer", "minimum": 1, "maximum": 200, "default": 20 } },
      "PaymentId": { "name": "paymentId", "in": "path", "required": true, "schema": { "type": "string" } },
      "PaymentIntentId": { "name": "paymentIntentId", "in": "path", "required": true, "schema": { "type": "string" } },
      "PaymentAttemptId": { "name": "paymentAttemptId", "in": "path", "required": true, "schema": { "type": "string" } }
    },
    "responses": {
      "Problem": { "description": "SDKWork problem detail", "content": { "application/problem+json": { "schema": { "$ref": "#/components/schemas/ProblemDetail" } } } }
    },
    "schemas": {
      "SdkWorkApiResponse": { "type": "object", "additionalProperties": false, "required": ["code", "data", "traceId"], "properties": { "code": { "type": "integer", "format": "int32", "const": 0 }, "data": { "type": "object" }, "traceId": { "type": "string", "format": "uuid" } } },
      "SdkWorkResourceData": { "type": "object", "additionalProperties": false, "required": ["item"], "properties": { "item": { "type": "object", "additionalProperties": true } } },
      "SdkWorkPageData": { "type": "object", "additionalProperties": false, "required": ["items", "pageInfo"], "properties": { "items": { "type": "array", "items": { "type": "object", "additionalProperties": true } }, "pageInfo": { "$ref": "#/components/schemas/PageInfo" } } },
      "SdkWorkCommandData": { "type": "object", "additionalProperties": false, "required": ["accepted"], "properties": { "accepted": { "type": "boolean", "const": true }, "resourceId": { "type": "string" }, "status": { "type": "string" } } },
      "SdkWorkResourceResponse": { "allOf": [{ "$ref": "#/components/schemas/SdkWorkApiResponse" }, { "type": "object", "required": ["data"], "properties": { "data": { "$ref": "#/components/schemas/SdkWorkResourceData" } } }] },
      "SdkWorkListResponse": { "allOf": [{ "$ref": "#/components/schemas/SdkWorkApiResponse" }, { "type": "object", "required": ["data"], "properties": { "data": { "$ref": "#/components/schemas/SdkWorkPageData" } } }] },
      "SdkWorkCommandResponse": { "allOf": [{ "$ref": "#/components/schemas/SdkWorkApiResponse" }, { "type": "object", "required": ["data"], "properties": { "data": { "$ref": "#/components/schemas/SdkWorkCommandData" } } }] },
      "PageInfo": { "type": "object", "additionalProperties": false, "required": ["mode", "page", "pageSize", "totalItems", "totalPages"], "properties": { "mode": { "type": "string", "const": "offset" }, "page": { "type": "integer", "minimum": 1 }, "pageSize": { "type": "integer", "minimum": 1, "maximum": 200 }, "totalItems": { "type": "string", "pattern": "^[0-9]+$" }, "totalPages": { "type": "integer", "minimum": 0 }, "hasMore": { "type": "boolean" } } },
      "ProblemDetail": { "type": "object", "additionalProperties": true, "required": ["type", "title", "status", "code", "traceId"], "properties": { "type": { "type": "string", "format": "uri-reference" }, "title": { "type": "string" }, "status": { "type": "integer", "minimum": 400, "maximum": 599 }, "detail": { "type": "string" }, "code": { "type": "integer", "format": "int32", "minimum": 40001, "maximum": 79999 }, "traceId": { "type": "string", "format": "uuid" } } },
      "CreatePaymentIntentCommand": { "type": "object", "additionalProperties": false, "required": ["orderId"], "properties": { "orderId": { "type": "string" }, "paymentMethod": { "type": "string" } } },
      "CreatePaymentCommand": { "type": "object", "additionalProperties": false, "required": ["orderId"], "properties": { "orderId": { "type": "string" }, "paymentMethod": { "type": "string" }, "amount": { "type": "string", "pattern": "^[0-9]+(\\.[0-9]{1,2})?$" }, "businessOrderId": { "type": "string" }, "businessType": { "type": "string" }, "clientIp": { "type": "string" }, "paymentProvider": { "type": "string" }, "paymentScene": { "type": "string" }, "productType": { "type": "string" } } },
      "ReconcilePaymentCommand": { "type": "object", "additionalProperties": false, "properties": { "orderId": { "type": "string" }, "outTradeNo": { "type": "string" }, "reconcileType": { "type": "string" } }, "anyOf": [{ "required": ["orderId"] }, { "required": ["outTradeNo"] }] },
